name: Build Multi-Arch Images

on:
  push:
    branches: [ master ]
    paths:
      - 'docker/**'
      - '.github/workflows/build-docker-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: docker-server-minecraft

jobs:
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      v_1_12_2_forge: ${{ steps.filter.outputs.v_1_12_2_forge }}
      v_1_18_2_arclight: ${{ steps.filter.outputs.v_1_18_2_arclight }}
      v_1_19_2_arclight: ${{ steps.filter.outputs.v_1_19_2_arclight }}
      v_1_19_4_arclight: ${{ steps.filter.outputs.v_1_19_4_arclight }}
      v_1_20_1_forge: ${{ steps.filter.outputs.v_1_20_1_forge }}
      v_1_20_1_arclight_47_4_18: ${{ steps.filter.outputs.v_1_20_1_arclight_47_4_18 }}
      v_1_20_1_arclight_server: ${{ steps.filter.outputs.v_1_20_1_arclight_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'docker/entrypoint.sh'
              - 'docker/java-jar-launcher.sh'
              - 'docker/java-forge-launcher.sh'
              - 'docker/ultra-core/**'
              - 'docker/.dockerignore'
              - '.github/workflows/build-docker-server.yml'
            v_1_12_2_forge:
              - 'docker/1.12.2-forge-14.23.5.2860/**'
              - 'docker/server/forge/1.12.2/**'
            v_1_18_2_arclight:
              - 'docker/1.18.2-arclight-1.0.12-forge-40.2.14/**'
              - 'docker/server/arclight/1.18.2/**'
            v_1_19_2_arclight:
              - 'docker/1.19.2-arclight-1.0.6-forge-43.4.4/**'
              - 'docker/server/arclight/1.19.2/**'
            v_1_19_4_arclight:
              - 'docker/1.19.4-arclight-1.0.8-forge-45.2.6/**'
              - 'docker/server/arclight/1.19.4/**'
            v_1_20_1_forge:
              - 'docker/1.20.1-forge-47.4.18/**'
              - 'docker/server/forge/1.20.1/**'
            v_1_20_1_arclight_47_4_18:
              - 'docker/1.20.1-arclight-1.0.6-forge-47.4.18/**'
            v_1_20_1_arclight_server:
              - 'docker/server/arclight/1.20.1/**'

  prepare:
    name: Prepare build matrix
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}
    steps:
      - name: Build version matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SHARED: ${{ needs.changes.outputs.shared }}
          V_1_12_2_FORGE: ${{ needs.changes.outputs.v_1_12_2_forge }}
          V_1_18_2_ARCLIGHT: ${{ needs.changes.outputs.v_1_18_2_arclight }}
          V_1_19_2_ARCLIGHT: ${{ needs.changes.outputs.v_1_19_2_arclight }}
          V_1_19_4_ARCLIGHT: ${{ needs.changes.outputs.v_1_19_4_arclight }}
          V_1_20_1_FORGE: ${{ needs.changes.outputs.v_1_20_1_forge }}
          V_1_20_1_ARCLIGHT_47_4_18: ${{ needs.changes.outputs.v_1_20_1_arclight_47_4_18 }}
          V_1_20_1_ARCLIGHT_SERVER: ${{ needs.changes.outputs.v_1_20_1_arclight_server }}
        run: |
          versions=()

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$SHARED" == "true" ]]; then
            versions=(
              "1.12.2-forge-14.23.5.2860"
              "1.18.2-arclight-1.0.12-forge-40.2.14"
              "1.19.2-arclight-1.0.6-forge-43.4.4"
              "1.19.4-arclight-1.0.8-forge-45.2.6"
              "1.20.1-forge-47.4.18"
              "1.20.1-arclight-1.0.6-forge-47.4.18"
            )
          else
            if [[ "$V_1_12_2_FORGE" == "true" ]]; then
              versions+=("1.12.2-forge-14.23.5.2860")
            fi
            if [[ "$V_1_18_2_ARCLIGHT" == "true" ]]; then
              versions+=("1.18.2-arclight-1.0.12-forge-40.2.14")
            fi
            if [[ "$V_1_19_2_ARCLIGHT" == "true" ]]; then
              versions+=("1.19.2-arclight-1.0.6-forge-43.4.4")
            fi
            if [[ "$V_1_19_4_ARCLIGHT" == "true" ]]; then
              versions+=("1.19.4-arclight-1.0.8-forge-45.2.6")
            fi
            if [[ "$V_1_20_1_FORGE" == "true" ]]; then
              versions+=("1.20.1-forge-47.4.18")
            fi
            if [[ "$V_1_20_1_ARCLIGHT_47_4_18" == "true" || "$V_1_20_1_ARCLIGHT_SERVER" == "true" ]]; then
              versions+=("1.20.1-arclight-1.0.6-forge-47.4.18")
            fi
          fi

          if [[ ${#versions[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "versions=[]" >> "$GITHUB_OUTPUT"
            echo "No image changes detected"
            exit 0
          fi

          versions_json=$(printf '%s\n' "${versions[@]}" | jq -R . | jq -s -c .)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "versions=${versions_json}" >> "$GITHUB_OUTPUT"
          echo "Selected versions: ${versions_json}"

  build:
    name: Build image (${{ matrix.version }} / ${{ matrix.arch_name }})
    needs: prepare
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ${{ matrix.runner }}
    concurrency:
      group: docker-server-${{ github.ref_name }}-${{ matrix.version }}-${{ matrix.arch_name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}
        arch_name:
          - amd64
          - arm64
        include:
          - arch_name: amd64
            platform: linux/amd64
            runner: ubuntu-22.04
          - arch_name: arm64
            platform: linux/arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=${{ matrix.version }}-{{sha}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Add architecture suffix to tags
        id: arch-tags
        run: |
          {
            echo 'tags<<EOF'
            echo "${{ steps.meta.outputs.tags }}" | sed 's/$/-${{ matrix.arch_name }}/'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/${{ matrix.version }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.arch-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.version }}-${{ matrix.arch_name }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.version }}-${{ matrix.arch_name }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.version }}-${{ matrix.arch_name }}
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:cache-${{ matrix.version }}-${{ matrix.arch_name }},mode=max
          add-hosts: |
            sessionserver.mojang.com:127.0.0.1
            authserver.mojang.com:127.0.0.1

  create-manifest:
    name: Create manifest (${{ matrix.version }})
    needs: [prepare, build]
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: docker-server-manifest-${{ github.ref_name }}-${{ matrix.version }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions) }}

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=${{ matrix.version }}-{{sha}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push manifest list
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF
